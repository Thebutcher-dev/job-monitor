# Company Catalog for Job Scraper
# ================================
# This file is a menu of companies with verified ATS slugs.
# Claude Code reads this to help you pick which companies to track.
# You do NOT edit this file -- your selections go into config.yaml.
#
# Supported ATS systems: greenhouse, lever, ashby, smartrecruiters, personio, recruitee, workday
#
# Status:
#   active     - slug verified, API responds
#   untested   - slug is best guess, needs dry-run verification
#   no_adapter - uses an ATS we don't support yet

categories:
  developer_platforms:
    label: "Developer Platforms & API Companies"
    description: "API-first companies where partnerships/platform roles are core"
  ai_labs:
    label: "Frontier AI Labs"
    description: "Companies building foundation models"
  ai_applications:
    label: "AI Applications"
    description: "AI-native product companies (generative, vertical, horizontal)"
  ai_infrastructure:
    label: "AI Infrastructure"
    description: "Vector DBs, model hosting, training infra, observability, dev tools"
  european_ai:
    label: "European AI"
    description: "European-HQ AI companies (DACH, UK, France, Nordics)"
  ai_rising_stars:
    label: "AI Rising Stars"
    description: "Early-stage AI startups (agents, coding, generative media, frontier)"
  social_media_tools:
    label: "Social Media & Creator Tools"
    description: "SMM platforms, creator-tool ecosystem"
  dach_tech:
    label: "DACH Tech"
    description: "Major DACH-region tech companies"

