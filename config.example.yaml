# config.yaml -- generated by Claude Code during setup
# This file shows the format. Your personal config.yaml will be created
# interactively when you run the setup in Claude Code.
#
# All fields below (keywords, locations, companies) are examples only.
# Claude Code will ask you about your preferences and generate this file for you.

filters:
  # Job matches if title or department contains any of these
  # (filled in based on your target roles during setup)
  include_keywords:
    - example keyword

  # Job is dropped if title/department contains any of these
  # (filled in based on what you want to exclude during setup)
  exclude_keywords:
    - intern
    - junior

  # Job location must contain at least one of these
  # (filled in based on your preferred locations during setup)
  locations:
    - europe
    - remote

  # Wins over locations (rejects e.g. "Remote - US")
  exclude_locations:
    - united states

always_email: false

email:
  to: you@gmail.com

companies:
  # Companies are selected from companies_catalog.yaml during setup
  - name: Example Company
    ats: greenhouse
    slug: example
